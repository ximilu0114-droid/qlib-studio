qlib_init:
  provider_uri: "~/.qlib/qlib_data/cn_data"
  region: cn

data_handler_config:
  start_time: 2010-01-01
  end_time: 2020-12-31
  fit_start_time: 2010-01-01
  fit_end_time: 2019-12-31
  instruments: csi300

market: csi300
benchmark: SH000300

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.9
      learning_rate: 0.05
      subsample: 0.9
      lambda_l1: 100
      lambda_l2: 500
      max_depth: 6
      num_leaves: 150
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha360
        module_path: qlib.contrib.data.handler
        kwargs:
          start_time: 2010-01-01
          end_time: 2020-12-31
          fit_start_time: 2010-01-01
          fit_end_time: 2019-12-31
          instruments: csi300
      segments:
        train: [2010-01-01, 2018-12-31]
        valid: [2019-01-01, 2019-06-30]
        test: [2019-07-01, 2020-12-31]
