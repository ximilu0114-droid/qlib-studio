qlib_init:
  provider_uri: "~/.qlib/qlib_data/cn_data"
  region: cn

data_handler_config:
  start_time: 2008-01-01
  end_time: 2020-12-31
  fit_start_time: 2008-01-01
  fit_end_time: 2019-12-31
  instruments: csi300

market: csi300
benchmark: SH000300

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.0421
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 8
      num_leaves: 210
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          start_time: 2008-01-01
          end_time: 2020-12-31
          fit_start_time: 2008-01-01
          fit_end_time: 2019-12-31
          instruments: csi300
      segments:
        train: [2008-01-01, 2019-12-31]
        valid: [2020-01-01, 2020-06-30]
        test: [2020-07-01, 2020-12-31]
